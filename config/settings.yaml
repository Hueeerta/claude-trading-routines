# Configuración del sistema. Los scripts y rutinas leen de aquí.

# Pares a operar (símbolos ccxt unificados). 8 large-caps líquidos con 2+ años.
# La rutina mensual debe revalidar este universo (ver scripts/check_universe.py):
# si un par se deslista o pierde liquidez, proponer reemplazo (no editar a ciegas).
symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT
  - XRP/USDT
  - ADA/USDT
  - AVAX/USDT
  - LINK/USDT

# Temporalidades
timeframe: "4h"        # timeframe de operación (swing)
trend_timeframe: "1d"  # filtro de tendencia mayor

# Capital y riesgo
capital_inicial_usdt: 1000.0
riesgo_por_trade: 0.02     # 2% del equity (techo). NO subir sin revisión conjunta.
max_posiciones: 2          # posiciones simultáneas
una_por_par: true          # nunca 2 posiciones en el mismo par
# 10% original era incompatible con el DD del trend-following (25-31%). En fase de
# aprendizaje se sube a 25% (decisión consciente y REVERSIBLE). El riesgo/trade (2%) NO cambia.
drawdown_circuit_breaker: 0.25  # 25% de DD desde máximo -> no abrir nuevas

# Costos para backtest (realistas)
comision: 0.001    # 0.1% por lado
slippage: 0.0005   # 0.05% estimado

# Estrategia activa. Fase 2 (paper/aprendizaje): MTF con trailing stop.
# NOTA: el backtest mostró que NO tiene edge robusto (gana por régimen/pocos pares).
# Se opera en paper como ejercicio de constancia y para ejercitar el sistema en vivo,
# NO como expectativa de rentabilidad. La búsqueda de edge real sigue en research (pairs).
estrategia_activa: mtf_ema_rsi

# Parámetros por estrategia
estrategias:
  trend_ema:
    ema_rapida: 20
    ema_lenta: 50
    ema_tendencia: 200   # sobre trend_timeframe (1d)
    rsi_periodo: 14
    rsi_max_entrada: 70  # no comprar sobre-extendido
    atr_periodo: 14
    atr_mult_stop: 2.0
  breakout_donchian:
    canal: 20
    vol_periodo: 20
    vol_mult: 1.2
    atr_periodo: 14
  meanrev_bollinger:
    bb_periodo: 20
    bb_desv: 2.0
    rsi_periodo: 14
    rsi_max_entrada: 30
    atr_periodo: 14
    atr_mult_stop: 1.5
    rango_max_desv: 0.05   # |close/ema200_1d - 1| < esto => mercado en rango
  mtf_ema_rsi:
    rsi_periodo: 14
    atr_periodo: 14
    atr_mult_stop: 1.5         # ATR_MULTIPLIER del original (stop inicial)
    ema_buffer: 0.005          # zona de ruido EMA20 semanal (0.5%)
    # Salida activa: trailing puro (la variante menos mala en el backtest OOS).
    use_targets: false         # sin TP fijos: dejar correr al ganador
    trail_mult: 3.0            # trailing chandelier = max_high - 3*ATR
    tp1_frac: 1.0
    breakeven_after_tp1: false
    tp1_rr: 2.0                # (sin uso con use_targets=false; referencia)
    tp2_rr: 3.0

# Histórico para backtest
historico:
  anios: 2            # ventana de EVALUACIÓN
  warmup_anios: 1     # historia extra para calentar indicadores (EMA200 1d, EMA20 1w)
  dir_cache: data_cache

# Telegram
telegram:
  parse_mode: HTML
